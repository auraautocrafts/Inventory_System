<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CarzSpa Stock">
<meta name="theme-color" content="#2D5016">
<title>CarzSpa — Stock Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1E8;
    --bg-soft: #EDE6D3;
    --card: #FFFFFF;
    --fg: #1A2419;
    --muted: #6B7568;
    --primary: #2D5016;
    --primary-2: #4A7C2A;
    --accent: #E07A2B;
    --accent-2: #F4A261;
    --danger: #C73E1D;
    --border: #E5DFD0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    font-family: 'Manrope', sans-serif;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    background-image:
      radial-gradient(at 15% -5%, rgba(224,122,43,.10) 0, transparent 45%),
      radial-gradient(at 90% 110%, rgba(45,80,22,.08) 0, transparent 45%);
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: calc(82px + var(--safe-bottom));
    overflow-x: hidden;
    touch-action: manipulation;
  }
  .display { font-family: 'Fraunces', serif; letter-spacing: -0.02em; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }

  input, select, textarea { font-size: 16px !important; }

  .tab-active { color: var(--primary) !important; }
  .tab-active .tab-icon { background: var(--primary); color: #fff; }
  .tab-icon { transition: all .25s ease; }

  @keyframes slideUp { from { transform: translateY(110%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastIn { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes toastOut { to { transform: translate(-50%, -20px); opacity: 0; } }
  @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  .modal-enter { animation: slideUp .35s cubic-bezier(.16,1,.3,1); }
  .overlay-enter { animation: fadeIn .2s ease-out; }
  .tab-content { animation: fadeIn .25s ease-out; }
  .toast-in { animation: toastIn .3s cubic-bezier(.16,1,.3,1) forwards; }
  .toast-out { animation: toastOut .3s ease-in forwards; }
  .pulse { animation: pulse-soft 1.8s infinite; }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary) !important;
    box-shadow: 0 0 0 3px rgba(45,80,22,.12);
  }
  .card-press { transition: transform .12s ease; }
  .card-press:active { transform: scale(.98); }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
  }

  .stock-bar { height: 6px; border-radius: 3px; background: var(--bg-soft); overflow: hidden; }
  .stock-bar > span {
    display: block; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--primary-2), var(--primary));
    transition: width .5s cubic-bezier(.16,1,.3,1);
  }
  .stock-bar.low > span { background: linear-gradient(90deg, var(--accent-2), var(--accent)); }
  .stock-bar.out > span { background: var(--danger); width: 100% !important; }

  .chip-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .chip-scroll::-webkit-scrollbar { display: none; }

  .item-option { transition: background .15s; }
  .item-option:active { background: var(--bg-soft); }

  .mini-toast {
    position: fixed; top: calc(var(--safe-top) + 6px); left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 100px; font-size: 12px; font-weight: 700;
    color: white; box-shadow: 0 4px 16px rgba(0,0,0,.15); white-space: nowrap; pointer-events: none;
  }

  .modal-open { position: fixed; width: 100%; overflow: hidden; }
  .hidden-field { display: none; }
  
  @supports (height: 100dvh) {
    .modal-sheet { max-height: 88dvh; }
  }
</style>
</head>
<body class="relative">
<div class="grain"></div>

<div id="toastContainer"></div>

<!-- Header -->
<header class="sticky top-0 z-40 bg-[var(--bg)]/85 backdrop-blur-xl border-b border-[var(--border)]" style="padding-top: var(--safe-top);">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[var(--primary)] to-[var(--primary-2)] flex items-center justify-center shadow-lg shadow-[var(--primary)]/20">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/></svg>
      </div>
      <div>
        <h1 class="display text-xl font-bold leading-none">CarzSpa</h1>
        <p class="text-[10px] text-[var(--muted)] uppercase tracking-[0.15em] font-semibold mt-0.5">Made By Anas</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="openSettingsModal()" class="flex items-center gap-1.5 px-3.5 py-2.5 rounded-xl bg-white border border-[var(--border)] text-[var(--fg)] text-xs font-bold active:scale-95 transition">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Manage</span>
      </button>
      <button onclick="exportToExcel()" class="flex items-center gap-1.5 px-3.5 py-2.5 rounded-xl bg-[var(--primary)] text-white text-xs font-bold active:scale-95 transition shadow-md shadow-[var(--primary)]/20">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Excel</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-4 relative z-10">

  <!-- Hero stats -->
  <section class="mb-5">
    <div class="bg-gradient-to-br from-[var(--primary)] to-[var(--primary-2)] rounded-3xl p-5 text-white relative overflow-hidden shadow-xl shadow-[var(--primary)]/20">
      <div class="absolute -right-8 -top-8 w-40 h-40 rounded-full bg-white/5"></div>
      <div class="absolute -right-12 -bottom-12 w-48 h-48 rounded-full bg-[var(--accent)]/15"></div>
      <div class="relative">
        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-white/70">Inventory Overview</p>
        <div class="flex items-end justify-between mt-1">
          <div>
            <p class="display text-5xl font-black leading-none" id="heroStock">0</p>
            <p class="text-xs text-white/80 mt-1.5 font-medium">Total unique items</p>
          </div>
          <div class="text-right">
            <p class="text-[10px] uppercase tracking-wider text-white/60 font-bold">Today</p>
            <p class="display text-2xl font-bold" id="heroToday">0</p>
            <p class="text-[10px] text-white/70">movements</p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-white/15">
          <div>
            <p class="text-[10px] text-white/60 uppercase font-bold">Items</p>
            <p class="text-lg font-bold display" id="statItems">0</p>
          </div>
          <div>
            <p class="text-[10px] text-white/60 uppercase font-bold">Low Stock</p>
            <p class="text-lg font-bold display text-[var(--accent-2)]" id="statLow">0</p>
          </div>
          <div>
            <p class="text-[10px] text-white/60 uppercase font-bold">Out of Stock</p>
            <p class="text-lg font-bold display text-red-200" id="statOut">0</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="tabContent" class="tab-content"></div>
</main>

<!-- Bottom nav -->
<nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-xl border-t border-[var(--border)]" style="padding-bottom: var(--safe-bottom);">
  <div class="max-w-2xl mx-auto grid grid-cols-3 px-4 py-2">
    <button onclick="switchTab('summary')" data-tab="summary" class="tab-btn tab-active flex flex-col items-center gap-1 py-1.5">
      <div class="tab-icon w-9 h-9 rounded-xl flex items-center justify-center bg-[var(--bg-soft)]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      </div>
      <span class="text-[10px] font-bold">Summary</span>
    </button>
    <button onclick="switchTab('inout')" data-tab="inout" class="tab-btn flex flex-col items-center gap-1 py-1.5 text-[var(--muted)]">
      <div class="tab-icon w-9 h-9 rounded-xl flex items-center justify-center bg-[var(--bg-soft)]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <span class="text-[10px] font-bold">In / Out</span>
    </button>
    <button onclick="switchTab('masters')" data-tab="masters" class="tab-btn flex flex-col items-center gap-1 py-1.5 text-[var(--muted)]">
      <div class="tab-icon w-9 h-9 rounded-xl flex items-center justify-center bg-[var(--bg-soft)]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
      </div>
      <span class="text-[10px] font-bold">Items</span>
    </button>
  </div>
</nav>

<!-- FAB -->
<button id="fab" onclick="fabAction()" class="fixed z-30 w-14 h-14 rounded-2xl bg-[var(--accent)] text-white shadow-xl shadow-[var(--accent)]/40 flex items-center justify-center active:scale-90 transition-transform" style="bottom: calc(82px + var(--safe-bottom)); right: 16px;">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Modal -->
<div id="modalOverlay" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm" onclick="closeModalBg(event)">
  <div id="modalContent" class="modal-sheet absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl bg-[var(--bg)] rounded-t-3xl modal-enter overflow-y-auto shadow-2xl" style="max-height: 88vh; padding-bottom: var(--safe-bottom);"></div>
</div>

<script>
/* ============================================================
   CARZSPA STOCK MANAGER — v2 (Empty Data, Custom Units & Conv)
   ============================================================ */

/* ===== DATA LAYER ===== */
let DB = {
  items: [],
  transactions: [],
  categories: [
    'Abrasives', 'Polishing Pads', 'Brushes', 'Microfibre & Towels',
    'Applicators', 'Compounds & Polishes', 'Cleaners', 'Dressing',
    'Ceramic Coating', 'PPF', 'Wash Accessories'
  ],
  units: ['Piece', 'Pack', 'Set', 'Pair', 'Bottle', 'Can', 'Drum', 'Roll', 'Box', 'Litre', 'ml', 'Kg', 'g'],
  conversions: [
    { from: 'Litre', to: 'ml', factor: 1000 },
    { from: 'Kg', to: 'g', factor: 1000 }
  ]
};
let currentTab = 'summary';
let txnItemSelected = null;
let summaryFilter = 'ALL';
let summaryCategory = 'ALL';
let txnFilter = 'ALL';
let masterCategory = 'ALL';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayStr() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  return local.toISOString().split('T')[0];
}

function loadDB() {
  try {
    const saved = localStorage.getItem('carzspa_stock_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && Array.isArray(parsed.items)) {
        DB = parsed;
        // Ensure all arrays exist
        DB.items = DB.items || [];
        DB.transactions = DB.transactions || [];
        DB.categories = DB.categories || [];
        DB.units = DB.units || [];
        DB.conversions = DB.conversions || [];
        return;
      }
    }
  } catch(e) { console.warn('Load error:', e); }
  saveDB();
}

function saveDB() {
  try { localStorage.setItem('carzspa_stock_v2', JSON.stringify(DB)); } 
  catch(e) { toast('Storage full', 'error'); }
}

/* ===== UNIT CONVERTER ===== */
function getBaseQty(qty, fromUnit, toUnit) {
  if (!fromUnit || !toUnit || fromUnit === toUnit) return qty;
  
  // Check direct rule: 1 fromUnit = factor toUnit
  let rule = DB.conversions.find(c => c.from === fromUnit && c.to === toUnit);
  if (rule) return qty * rule.factor;
  
  // Check reverse rule: 1 toUnit = factor fromUnit -> 1 fromUnit = 1/factor toUnit
  rule = DB.conversions.find(c => c.from === toUnit && c.to === fromUnit);
  if (rule) return qty / rule.factor;
  
  return qty; // Fallback 1:1 if no rule
}

function currentStock(itemId) {
  let s = 0;
  const item = DB.items.find(i => i.id === itemId);
  if (!item) return 0;
  
  DB.transactions.forEach(t => {
    if (t.itemId === itemId) {
      // Dynamically convert transaction qty to item's base unit
      const baseQty = getBaseQty(t.qty, t.unit, item.unit);
      s += (t.type === 'IN' ? baseQty : -baseQty);
    }
  });
  return s;
}

/* ===== MINI TOAST ===== */
function toast(msg, type) {
  type = type || 'success';
  const colors = { success: '#2D5016', error: '#C73E1D', info: '#E07A2B' };
  const icons = {
    success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  const el = document.createElement('div');
  el.className = 'mini-toast toast-in';
  el.style.background = colors[type];
  el.innerHTML = icons[type] + '<span>' + msg + '</span>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => {
    el.classList.remove('toast-in');
    el.classList.add('toast-out');
    setTimeout(() => el.remove(), 300);
  }, 1800);
}

/* ===== CONFIRM MODAL ===== */
function confirmAction(message, onYes) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="p-6 text-center">
      <div class="w-14 h-14 rounded-2xl bg-red-100 mx-auto mb-4 flex items-center justify-center">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#C73E1D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h2 class="display text-xl font-bold mb-1.5">Please Confirm</h2>
      <p class="text-sm text-[var(--muted)] mb-5 leading-relaxed">${message}</p>
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 py-3 rounded-xl bg-white border border-[var(--border)] text-sm font-bold">Cancel</button>
        <button id="confirmYesBtn" class="flex-1 py-3 rounded-xl bg-[var(--danger)] text-white text-sm font-bold">Delete</button>
      </div>
    </div>`;
  overlay.classList.remove('hidden');
  overlay.classList.add('overlay-enter');
  document.body.classList.add('modal-open');
  document.getElementById('confirmYesBtn').onclick = function() { closeModal(); onYes(); };
}

/* ===== TAB ROUTING ===== */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    const active = b.dataset.tab === tab;
    b.classList.toggle('tab-active', active);
    b.classList.toggle('text-[var(--muted)]', !active);
  });
  const c = document.getElementById('tabContent');
  c.classList.remove('tab-content'); void c.offsetWidth; c.classList.add('tab-content');
  renderTab();
}

function renderTab() {
  const c = document.getElementById('tabContent');
  if (currentTab === 'summary') renderSummary(c);
  else if (currentTab === 'inout') renderInOut(c);
  else renderMasters(c);
  renderStats();
  updateFAB();
}

function updateFAB() {
  const fab = document.getElementById('fab');
  fab.style.display = (currentTab === 'inout' || currentTab === 'masters') ? 'flex' : 'none';
}

function fabAction() {
  if (currentTab === 'inout') openTxnModal();
  else if (currentTab === 'masters') openItemModal();
}

function renderStats() {
  let lowCount = 0, outCount = 0;
  DB.items.forEach(it => {
    const s = currentStock(it.id);
    if (s <= 0) outCount++;
    else if (s <= it.minStock) lowCount++;
  });
  document.getElementById('heroStock').textContent = DB.items.length;
  document.getElementById('heroToday').textContent = DB.transactions.filter(t => t.date === todayStr()).length;
  document.getElementById('statItems').textContent = DB.items.length;
  document.getElementById('statLow').textContent = lowCount;
  document.getElementById('statOut').textContent = outCount;
}

/* ===== SUMMARY TAB ===== */
function renderSummary(container) {
  if (DB.items.length === 0) {
    container.innerHTML = emptyState('No items yet', 'Add items in the Items tab to begin.', 'masters');
    return;
  }
  const cats = ['ALL', ...DB.categories];
  container.innerHTML = `
    <div class="chip-scroll flex gap-2 mb-2 overflow-x-auto pb-1">
      ${[['ALL','All'],['LOW','Low Stock'],['OUT','Out of Stock'],['OK','In Stock']].map(([k,l]) => `
        <button onclick="setSummaryFilter('${k}')" class="px-3.5 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition ${summaryFilter===k ? 'bg-[var(--primary)] text-white' : 'bg-white border border-[var(--border)] text-[var(--muted)]'}">${l}</button>
      `).join('')}
    </div>
    <div class="chip-scroll flex gap-2 mb-3 overflow-x-auto pb-1">
      ${cats.map(c => `
        <button onclick="setSummaryCategory('${c}')" class="px-3 py-1 rounded-full text-[11px] font-bold whitespace-nowrap transition ${summaryCategory===c ? 'bg-[var(--accent)] text-white' : 'bg-white border border-[var(--border)] text-[var(--muted)]'}">${c==='ALL'?'All Categories':c}</button>
      `).join('')}
    </div>
    <div class="relative mb-3">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--muted)]" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchSummary" oninput="renderSummaryList()" type="text" placeholder="Search items..." autocomplete="off" style="padding-left:38px;" class="w-full pr-4 py-3 rounded-xl bg-white border border-[var(--border)] text-sm">
    </div>
    <div id="summaryList" class="space-y-2.5"></div>
  `;
  renderSummaryList();
}

function setSummaryFilter(k) { summaryFilter = k; renderSummary(document.getElementById('tabContent')); }
function setSummaryCategory(c) { summaryCategory = c; renderSummary(document.getElementById('tabContent')); }

function renderSummaryList() {
  const list = document.getElementById('summaryList');
  if (!list) return;
  const q = (document.getElementById('searchSummary')?.value || '').toLowerCase().trim();
  let items = DB.items.filter(it => {
    if (summaryCategory !== 'ALL' && it.category !== summaryCategory) return false;
    if (q && !it.name.toLowerCase().includes(q) && !it.code.toLowerCase().includes(q)) return false;
    const s = currentStock(it.id);
    if (summaryFilter === 'LOW') return s > 0 && s <= it.minStock;
    if (summaryFilter === 'OUT') return s <= 0;
    if (summaryFilter === 'OK') return s > it.minStock;
    return true;
  });

  if (items.length === 0) {
    list.innerHTML = '<p class="text-center text-[var(--muted)] py-10 text-sm">No items match</p>';
    return;
  }

  list.innerHTML = items.map(it => {
    const stock = currentStock(it.id);
    const isOut = stock <= 0;
    const isLow = !isOut && stock <= it.minStock;
    let inT = 0, outT = 0;
    
    DB.transactions.forEach(t => {
      if (t.itemId === it.id) {
        const baseQty = getBaseQty(t.qty, t.unit, it.unit);
        if (t.type==='IN') inT += baseQty; else outT += baseQty;
      }
    });
    
    const pct = Math.min(100, Math.max(4, (stock / Math.max(it.minStock * 2, 1)) * 100));
    const barClass = isOut ? 'out' : isLow ? 'low' : '';
    let badge = '';
    if (isOut) badge = '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700">OUT</span>';
    else if (isLow) badge = '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 pulse">LOW</span>';
    else badge = '<span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-800">OK</span>';

    return `
      <div class="card-press bg-white rounded-2xl p-4 border border-[var(--border)]">
        <div class="flex items-start justify-between gap-2 mb-2">
          <div class="flex-1 min-w-0">
            <p class="font-bold text-sm truncate">${it.name}</p>
            <p class="text-[11px] text-[var(--muted)] mt-0.5">${it.code} · ${it.category}</p>
          </div>
          ${badge}
        </div>
        <div class="stock-bar ${barClass} mb-3"><span style="width:${pct}%"></span></div>
        <div class="grid grid-cols-4 gap-2 items-end">
          <div><p class="text-[9px] text-[var(--muted)] uppercase font-bold">In</p><p class="text-sm font-bold text-[var(--primary)]">+${inT.toFixed(2)}</p></div>
          <div><p class="text-[9px] text-[var(--muted)] uppercase font-bold">Out</p><p class="text-sm font-bold text-[var(--danger)]">-${outT.toFixed(2)}</p></div>
          <div><p class="text-[9px] text-[var(--muted)] uppercase font-bold">Balance</p><p class="display text-xl font-black ${isOut ? 'text-[var(--danger)]' : isLow ? 'text-[var(--accent)]' : 'text-[var(--fg)]'}">${stock.toFixed(2)}</p></div>
          <div class="text-right"><p class="text-[9px] text-[var(--muted)] uppercase font-bold">Unit / Min</p><p class="text-xs font-bold">${it.unit}</p><p class="text-[10px] text-[var(--muted)]">min ${it.minStock}</p></div>
        </div>
      </div>`;
  }).join('');
}

/* ===== IN/OUT TAB ===== */
function renderInOut(container) {
  container.innerHTML = `
    <div class="flex gap-2 mb-3">
      ${[['ALL','All'],['IN','Stock In'],['OUT','Stock Out']].map(([k,l]) => `
        <button onclick="setTxnFilter('${k}')" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition ${txnFilter===k ? 'bg-[var(--primary)] text-white' : 'bg-white border border-[var(--border)] text-[var(--muted)]'}">${l}</button>
      `).join('')}
    </div>
    <div id="txnList" class="space-y-3"></div>
  `;
  renderTxnList();
}

function setTxnFilter(k) { txnFilter = k; renderInOut(document.getElementById('tabContent')); }

function renderTxnList() {
  const list = document.getElementById('txnList');
  if (!list) return;
  let txns = [...DB.transactions].sort((a, b) => (b.date + b.id).localeCompare(a.date + a.id));
  if (txnFilter !== 'ALL') txns = txns.filter(t => t.type === txnFilter);

  if (txns.length === 0) {
    list.innerHTML = emptyState('No entries yet', 'Tap + to record stock in or out.', null);
    return;
  }

  const groups = {};
  txns.forEach(t => { (groups[t.date] = groups[t.date] || []).push(t); });
  const dates = Object.keys(groups).sort().reverse();

  list.innerHTML = dates.map(date => {
    const d = new Date(date + 'T00:00');
    const today = todayStr();
    const yest = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    let label = d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
    if (date === today) label = 'Today';
    else if (date === yest) label = 'Yesterday';

    return `
      <div>
        <div class="flex items-center justify-between px-1 mb-2">
          <p class="text-[10px] uppercase tracking-[0.15em] font-bold text-[var(--muted)]">${label}</p>
        </div>
        ${groups[date].map(t => {
          const item = DB.items.find(i => i.id === t.itemId);
          const isIn = t.type === 'IN';
          const metaParts = [];
          if (!isIn && t.jobcard) metaParts.push('JC: ' + t.jobcard);
          if (isIn && t.company) metaParts.push(t.company);
          if (t.remark) metaParts.push(t.remark);
          const meta = metaParts.join(' · ') || '—';
          
          let conversionTxt = '';
          if (item && t.unit !== item.unit) {
            conversionTxt = `<span class="block text-[9px] text-[var(--accent)] font-bold mt-0.5">Issued in ${t.unit} (Base: ${getBaseQty(t.qty, t.unit, item.unit).toFixed(2)} ${item.unit})</span>`;
          }

          return `
            <div class="card-press bg-white rounded-2xl p-3 border border-[var(--border)] flex items-center gap-3 mb-2">
              <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 ${isIn ? 'bg-green-100' : 'bg-red-100'}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${isIn ? '#2D5016' : '#C73E1D'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  ${isIn ? '<path d="M12 19V5M5 12l7-7 7 7"/>' : '<path d="M12 5v14M19 12l-7 7-7-7"/>'}
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-sm truncate">${item ? item.name : 'Unknown'}</p>
                <p class="text-[11px] text-[var(--muted)] truncate">${meta}</p>
                ${conversionTxt}
                ${item ? `<span class="inline-block text-[9px] font-bold px-1.5 py-0.5 rounded bg-[var(--bg-soft)] text-[var(--muted)] mt-1">${item.code}</span>` : ''}
              </div>
              <div class="text-right flex-shrink-0">
                <p class="font-bold text-base ${isIn ? 'text-[var(--primary)]' : 'text-[var(--danger)]'}">${isIn ? '+' : '-'}${t.qty}</p>
                <p class="text-[9px] text-[var(--muted)] -mt-1">${t.unit}</p>
                <button onclick="confirmDeleteTxn('${t.id}')" class="text-[10px] text-[var(--muted)] mt-1 font-semibold">Delete</button>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function confirmDeleteTxn(id) {
  confirmAction('Delete this stock entry? This cannot be undone.', () => {
    DB.transactions = DB.transactions.filter(t => t.id !== id);
    saveDB(); toast('Entry deleted', 'info'); renderTab();
  });
}

      <input id="searchMaster" oninput="renderMasterList()" type="text" placeholder="Search by name or code..." autocomplete="off" style="padding-left:38px;" class="w-full pr-4 py-3 rounded-xl bg-white border border-[var(--border)] text-sm">

function renderMasterList() {
  const list = document.getElementById('masterList');
  if (!list) return;
  const q = (document.getElementById('searchMaster')?.value || '').toLowerCase().trim();
  let items = DB.items.filter(it => {
    if (masterCategory !== 'ALL' && it.category !== masterCategory) return false;

  });

        <div class="flex items-start justify-between gap-2 mb-1">
          <div class="flex-1 min-w-0">

              <span>Code: <b class="text-[var(--fg)]">${it.code}</b></span>
              <span>Unit: <b class="text-[var(--fg)]">${it.unit}</b></span>
              <span>Cat: <b class="text-[var(--fg)]">${it.category}</b></span>

        </div>
      </div>`;
  }).join('');
}

function confirmDeleteItem(id) {
  const it = DB.items.find(i => i.id === id);
  if (!it) return;
  const txns = DB.transactions.filter(t => t.itemId === id);
  const msg = txns.length > 0
    ? `"${it.name}" has ${txns.length} transaction(s). Deleting will also remove them.`
    : `Delete "${it.name}"?`;
  confirmAction(msg, () => {
    DB.transactions = DB.transactions.filter(t => t.itemId !== id);
    DB.items = DB.items.filter(i => i.id !== id);
    saveDB(); toast('Item deleted', 'info'); renderTab();
  });
}

          <button type="submit" class="flex-1 py-3 rounded-xl bg-[var(--primary)] text-white text-sm font-bold shadow-md shadow-[var(--primary)]/20">${item ? 'Update' : 'Add Item'}</button>
        </div>
      </form>
    </div>`;
  showModal();
}

function saveItem(e, id) {
  e.preventDefault();
  const f = e.target;
  const data = {
    code: f.code.value.trim(),
    name: f.name.value.trim(),
    unit: f.unit.value,
    category: f.category.value,
    minStock: parseFloat(f.minStock.value) || 0
  };
  if (!data.code || !data.name) { toast('Fill required fields', 'error'); return; }
  const dup = DB.items.find(i => i.code.toLowerCase() === data.code.toLowerCase() && i.id !== id);
  if (dup) { toast('Code already exists', 'error'); return; }
  
  if (id) {
    const idx = DB.items.findIndex(i => i.id === id);
    if (idx >= 0) DB.items[idx] = { ...DB.items[idx], ...data };
    toast('Item updated');
  } else {
    DB.items.push({ id: uid(), ...data });
    toast('Item added');
  }
  saveDB(); closeModal(); renderTab();
}

function renderTxnItemOptions(query) {

      it.name.toLowerCase().includes(q) ||
      it.code.toLowerCase().includes(q) ||
      it.category.toLowerCase().includes(q)
    );

  const container = document.getElementById('txnItemResults');
  if (!container) return;

  if (items.length === 0) {
    container.innerHTML = '<p class="p-4 text-center text-xs text-[var(--muted)]">No items found</p>';
    return;
  }
  const show = items.slice(0, 30);
  container.innerHTML = show.map(it => {
    const stock = currentStock(it.id);
    const isSelected = txnItemSelected === it.id;
    return `
      <div onclick="selectTxnItem('${it.id}')" class="item-option px-3 py-2.5 cursor-pointer flex items-center justify-between gap-2 ${isSelected ? 'bg-[var(--bg-soft)]' : 'bg-white'}">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold truncate ${isSelected ? 'text-[var(--primary)]' : ''}">${it.name}</p>
          <p class="text-[10px] text-[var(--muted)]">${it.code} · ${it.category}</p>
        </div>
        <div class="text-right flex-shrink-0">
          <p class="text-xs font-bold ${stock <= 0 ? 'text-red-500' : stock <= it.minStock ? 'text-amber-600' : 'text-[var(--primary)]'}">${stock.toFixed(2)}</p>
          <p class="text-[9px] text-[var(--muted)]">${it.unit}</p>
        </div>
      </div>`;
  }).join('');
}

function filterTxnItems() {
  const input = document.getElementById('txnItemSearch');
  if (!input) return;
  if (txnItemSelected) {
    txnItemSelected = null;
    document.getElementById('txnItemId').value = '';
    document.getElementById('txnUnitSelect').value = '';
    document.getElementById('conversionHint').classList.add('hidden-field');
  }
  renderTxnItemOptions(input.value);
}

function selectTxnItem(id) {
  txnItemSelected = id;
  document.getElementById('txnItemId').value = id;
  const item = DB.items.find(i => i.id === id);
  if (item) {
    document.getElementById('txnItemSearch').value = item.name;
    document.getElementById('txnUnitSelect').value = item.unit;
    updateConversionHint();
  }
  renderTxnItemOptions(document.getElementById('txnItemSearch').value);
}

function updateConversionHint() {
  if (!txnItemSelected) return;
  const item = DB.items.find(i => i.id === txnItemSelected);
  if (!item) return;
  
  const qty = parseFloat(document.getElementById('qtyInput').value) || 0;
  const txnUnit = document.getElementById('txnUnitSelect').value;
  const hint = document.getElementById('conversionHint');
  
  if (txnUnit !== item.unit) {
    const baseQty = getBaseQty(qty, txnUnit, item.unit);
    if (qty > 0) {
      hint.textContent = `= ${baseQty.toFixed(3)} ${item.unit} (Base Unit)`;
      hint.classList.remove('hidden-field');
    } else {
      hint.classList.add('hidden-field');
    }
  } else {
    hint.classList.add('hidden-field');
  }
}

function selectType(type) {
  document.getElementById('typeField').value = type;
  const inB = document.getElementById('typeIN');
  const outB = document.getElementById('typeOUT');
  const companyField = document.getElementById('companyField');
  const jobcardField = document.getElementById('jobcardField');

  if (type === 'IN') {
    inB.className = 'py-3.5 rounded-xl bg-green-100 border-2 border-[var(--primary)] text-[var(--primary)] font-bold text-sm flex items-center justify-center gap-2';
    outB.className = 'py-3.5 rounded-xl bg-white border-2 border-[var(--border)] text-[var(--muted)] font-bold text-sm flex items-center justify-center gap-2';
    companyField.classList.remove('hidden-field');
    jobcardField.classList.add('hidden-field');
    document.getElementById('jobcardInput').required = false;
  } else {
    inB.className = 'py-3.5 rounded-xl bg-white border-2 border-[var(--border)] text-[var(--muted)] font-bold text-sm flex items-center justify-center gap-2';
    outB.className = 'py-3.5 rounded-xl bg-red-100 border-2 border-[var(--danger)] text-[var(--danger)] font-bold text-sm flex items-center justify-center gap-2';
    companyField.classList.add('hidden-field');
    jobcardField.classList.remove('hidden-field');
    document.getElementById('jobcardInput').required = true;
  }
}

function saveTxn(e) {
  e.preventDefault();
  const f = e.target;
  const type = f.type.value;
  const itemId = f.itemId.value;
  const qty = parseFloat(f.qty.value);
  const unit = f.unit.value;
  const date = f.date.value || todayStr();
  const remark = f.remark.value.trim();
  const company = type === 'IN' ? (f.company.value || '') : '';
  const jobcard = type === 'OUT' ? (f.jobcard.value.trim() || '') : '';

  if (!itemId) { toast('Select an item', 'error'); return; }
  if (!qty || qty <= 0) { toast('Enter valid quantity', 'error'); return; }
  if (type === 'OUT' && !jobcard) { toast('Enter jobcard no.', 'error'); return; }

  if (type === 'OUT') {
    const item = DB.items.find(i => i.id === itemId);
    const baseQty = getBaseQty(qty, unit, item.unit);
    const cs = currentStock(itemId);
    if (baseQty > cs) { toast('Not enough stock. Only ' + cs.toFixed(2) + ' ' + item.unit + ' left', 'error'); return; }
  }

  DB.transactions.push({ id: uid(), date, itemId, type, qty, unit, company, jobcard, remark });
  saveDB();
  closeModal();
  toast(type === 'IN' ? 'Stock added' : 'Stock issued');
  renderTab();
}

/* ===== SETTINGS MODAL (CATEGORIES & UNITS) ===== */
function openSettingsModal() {
  document.getElementById('modalContent').innerHTML = `
    <div class="p-5">
      <div class="flex items-center justify-between mb-5">
        <div>
          <p class="text-[10px] uppercase tracking-[0.15em] font-bold text-[var(--muted)]">Configuration</p>
          <h2 class="display text-2xl font-bold">Manage Masters</h2>
        </div>
        <button onclick="closeModal()" class="w-9 h-9 rounded-xl bg-white border border-[var(--border)] flex items-center justify-center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Categories Section -->
      <div class="mb-6">
        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
          Categories
        </h3>
        <form onsubmit="addCategory(event)" class="flex gap-2 mb-3">
          <input type="text" id="newCatInput" placeholder="Add new category..." autocomplete="off" class="flex-1 px-3.5 py-2.5 rounded-xl bg-white border border-[var(--border)]">
          <button type="submit" class="px-4 py-2.5 rounded-xl bg-[var(--primary)] text-white text-sm font-bold">Add</button>
        </form>
        <div id="catList" class="flex flex-wrap gap-2"></div>
      </div>

      <hr class="border-[var(--border)] my-5">

      <!-- Units Section -->
      <div class="mb-6">
        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          Units
        </h3>
        <form onsubmit="addUnit(event)" class="flex gap-2 mb-3">
          <input type="text" id="newUnitInput" placeholder="Add new unit (e.g., Roll)..." autocomplete="off" class="flex-1 px-3.5 py-2.5 rounded-xl bg-white border border-[var(--border)]">
          <button type="submit" class="px-4 py-2.5 rounded-xl bg-[var(--primary)] text-white text-sm font-bold">Add</button>
        </form>
        <div id="unitList" class="flex flex-wrap gap-2"></div>
      </div>

      <hr class="border-[var(--border)] my-5">

      <!-- Conversions Section -->
      <div class="mb-6">
        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Unit Conversions
        </h3>
        <p class="text-[11px] text-[var(--muted)] mb-3">Define how sub-units convert to the base unit. E.g., 1 Litre = 1000 ml. The system uses these rules to auto-adjust stock.</p>
        
        <form onsubmit="addConversion(event)" class="grid grid-cols-12 gap-2 mb-3 items-center">
          <div class="col-span-3 text-center text-xs font-bold text-[var(--muted)]">1</div>
          <select id="convFrom" class="col-span-4 px-2 py-2.5 rounded-xl bg-white border border-[var(--border)] text-sm">
            ${DB.units.map(u => `<option value="${u}">${u}</option>`).join('')}
          </select>
          <div class="col-span-1 text-center text-xs font-bold">=</div>
          <input type="number" step="any" id="convFactor" placeholder="1000" required class="col-span-4 px-2 py-2.5 rounded-xl bg-white border border-[var(--border)] text-sm">
          <select id="convTo" class="col-span-12 px-3 py-2.5 rounded-xl bg-white border border-[var(--border)] text-sm">
            ${DB.units.map(u => `<option value="${u}">${u}</option>`).join('')}
          </select>
          <button type="submit" class="col-span-12 py-2.5 rounded-xl bg-[var(--primary)] text-white text-sm font-bold mt-1">Add Rule</button>
        </form>
        <div id="convList" class="space-y-2"></div>
      </div>

    </div>`;
  renderSettingsLists();
  showModal();
}

function renderSettingsLists() {
  const catList = document.getElementById('catList');
  if (catList) {
    catList.innerHTML = DB.categories.map(c => `
      <div class="flex items-center gap-1.5 bg-white border border-[var(--border)] pl-3 pr-1.5 py-1.5 rounded-full">
        <span class="text-xs font-bold">${c}</span>
        <button onclick="deleteCategory('${c.replace(/'/g, "\\'")}')" class="w-5 h-5 rounded-full bg-red-50 text-red-600 flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
  }
  
  const unitList = document.getElementById('unitList');
  if (unitList) {
    unitList.innerHTML = DB.units.map(u => `
      <div class="flex items-center gap-1.5 bg-white border border-[var(--border)] pl-3 pr-1.5 py-1.5 rounded-full">
        <span class="text-xs font-bold">${u}</span>
        <button onclick="deleteUnit('${u.replace(/'/g, "\\'")}')" class="w-5 h-5 rounded-full bg-red-50 text-red-600 flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
  }

  const convList = document.getElementById('convList');
  if (convList) {
    if (DB.conversions.length === 0) {
      convList.innerHTML = '<p class="text-xs text-[var(--muted)] text-center py-3">No conversion rules yet.</p>';
    } else {
      convList.innerHTML = DB.conversions.map((c, i) => `
        <div class="flex items-center justify-between bg-white border border-[var(--border)] p-3 rounded-xl">
          <span class="text-sm font-bold">1 ${c.from} = ${c.factor} ${c.to}</span>
          <button onclick="deleteConversion(${i})" class="w-7 h-7 rounded-lg bg-red-50 text-red-600 flex items-center justify-center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      `).join('');
    }
  }
}

function addCategory(e) {
  e.preventDefault();
  const input = document.getElementById('newCatInput');
  const val = input.value.trim();
  if (val && !DB.categories.includes(val)) {
    DB.categories.push(val);
    DB.categories.sort();
    saveDB();
    input.value = '';
    renderSettingsLists();
    toast('Category added');
  }
}

function deleteCategory(cat) {
  DB.categories = DB.categories.filter(c => c !== cat);
  saveDB();
  renderSettingsLists();
  toast('Category removed', 'info');
}

function addUnit(e) {
  e.preventDefault();
  const input = document.getElementById('newUnitInput');
  const val = input.value.trim();
  if (val && !DB.units.includes(val)) {
    DB.units.push(val);
    saveDB();
    input.value = '';
    renderSettingsLists();
    toast('Unit added');
  }
  // Refresh dropdowns in form
  const convFrom = document.getElementById('convFrom');
  const convTo = document.getElementById('convTo');
  if (convFrom && convTo) {
    convFrom.innerHTML = DB.units.map(u => `<option value="${u}">${u}</option>`).join('');
    convTo.innerHTML = DB.units.map(u => `<option value="${u}">${u}</option>`).join('');
  }
}

function deleteUnit(unit) {
  DB.units = DB.units.filter(u => u !== unit);
  DB.conversions = DB.conversions.filter(c => c.from !== unit && c.to !== unit);
  saveDB();
  renderSettingsLists();
  toast('Unit removed', 'info');
}

function addConversion(e) {
  e.preventDefault();
  const from = document.getElementById('convFrom').value;
  const to = document.getElementById('convTo').value;
  const factor = parseFloat(document.getElementById('convFactor').value);
  
  if (from === to) { toast('Units must be different', 'error'); return; }
  if (!factor || factor <= 0) { toast('Enter valid factor', 'error'); return; }
  
  // Overwrite existing rule if present
  DB.conversions = DB.conversions.filter(c => !(c.from === from && c.to === to) && !(c.from === to && c.to === from));
  DB.conversions.push({ from, to, factor });
  saveDB();
  document.getElementById('convFactor').value = '';
  renderSettingsLists();
  toast('Conversion rule added');
}

function deleteConversion(index) {
  DB.conversions.splice(index, 1);
  saveDB();
  renderSettingsLists();
  toast('Rule removed', 'info');
}

/* ===== EMPTY STATE ===== */
function emptyState(title, sub, gotoTab) {
  return `
    <div class="text-center py-16 px-4">
      <div class="w-16 h-16 rounded-2xl bg-white border border-[var(--border)] mx-auto mb-4 flex items-center justify-center">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6B7568" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <p class="font-bold text-sm">${title}</p>
      <p class="text-xs text-[var(--muted)] mt-1 mb-4">${sub}</p>
      ${gotoTab ? `<button onclick="switchTab('${gotoTab}')" class="px-4 py-2 rounded-xl bg-[var(--primary)] text-white text-xs font-bold">Go to ${gotoTab === 'masters' ? 'Items' : 'In/Out'}</button>` : ''}
    </div>`;
}

/* ===== MODAL CONTROL ===== */
function showModal() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.body.classList.add('modal-open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.body.classList.remove('modal-open');
}
function closeModalBg(e) {
  if (e.target.id === 'modalOverlay') closeModal();
}

/* ===== EXCEL EXPORT ===== */
function exportToExcel() {
  if (DB.items.length === 0 && DB.transactions.length === 0) { toast('No data to export', 'error'); return; }

  // Sheet 1: Stock Summary
  const summary = DB.items.map(it => {
    const s = currentStock(it.id);
    let inT = 0, outT = 0;
    DB.transactions.forEach(t => {
      if (t.itemId === it.id) {
        const baseQty = getBaseQty(t.qty, t.unit, it.unit);
        if (t.type === 'IN') inT += baseQty; else outT += baseQty;
      }
    });
    return {
      'Code': it.code,
      'Item Name': it.name,
      'Category': it.category,
      'Base Unit': it.unit,
      'Total In': inT.toFixed(3),
      'Total Out': outT.toFixed(3),
      'Current Stock': s.toFixed(3),
      'Min Required': it.minStock,
      'Status': s <= 0 ? 'Out of Stock' : s <= it.minStock ? 'Low Stock' : 'In Stock'
    };
  });

  // Sheet 2: In/Out Entries
  const txns = [...DB.transactions]
    .sort((a, b) => (a.date + a.id).localeCompare(b.date + b.id))
    .map(t => {
      const it = DB.items.find(i => i.id === t.itemId);
      const baseQty = it ? getBaseQty(t.qty, t.unit, it.unit) : t.qty;
      return {
        'Date': t.date,
        'Type': t.type === 'IN' ? 'Stock In' : 'Stock Out',
        'Jobcard No': t.jobcard || '',
        'Company': t.company || '',
        'Code': it ? it.code : '',
        'Item Name': it ? it.name : 'Unknown',
        'Qty Entered': t.qty,
        'Unit Used': t.unit,
        'Qty in Base': baseQty.toFixed(3),
        'Base Unit': it ? it.unit : '',
        'Remarks': t.remark || ''
      };
    });

  // Sheet 3: Item Masters
  const masters = DB.items.map(it => ({
    'Code': it.code,
    'Item Name': it.name,
    'Category': it.category,
    'Base Unit': it.unit,
    'Min Stock': it.minStock
  }));

  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.json_to_sheet(summary);
  ws1['!cols'] = [{ wch: 12 }, { wch: 35 }, { wch: 18 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 13 }, { wch: 12 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, ws1, 'Stock Summary');

  const ws2 = XLSX.utils.json_to_sheet(txns);
  ws2['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 35 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 10 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'In Out Entries');

  const ws3 = XLSX.utils.json_to_sheet(masters);
  ws3['!cols'] = [{ wch: 12 }, { wch: 35 }, { wch: 18 }, { wch: 10 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws3, 'Item Masters');

  const fname = 'CarzSpa_Stock_' + todayStr() + '.xlsx';
  XLSX.writeFile(wb, fname);
  toast('Excel exported');
}

/* ===== INIT ===== */
loadDB();
switchTab('summary');

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('modalOverlay').addEventListener('touchmove', function(e) {
  if (e.target.id === 'modalOverlay') e.preventDefault();
}, { passive: false });
</script>
